services:
  - type: web
    name: autoresearch-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      # DATABASE_URL is auto-configured in the code.
      # Set via Render Dashboard if using Postgres.

  - type: web
    name: autoresearch-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    rootDir: frontend
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: autoresearch-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
